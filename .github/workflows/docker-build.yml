name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          pip install jsonpath-ng

      - name: Run Python plugin tests
        run: |
          cd tests
          ./run_all_tests.sh

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs
          path: tests/*.log
          if-no-files-found: ignore

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false  # let all variants report independently
      matrix:
        variant:
          - name: jsonpath
            dockerfile: Dockerfile
            is_default: true
          - name: jq
            dockerfile: Dockerfile.jq
            is_default: false
          - name: dual
            dockerfile: Dockerfile.dual
            is_default: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            # Version tags for releases (e.g., v1.0.0)
            type=semver,pattern={{version}},enable=${{ matrix.variant.is_default }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ matrix.variant.is_default }}
            type=semver,pattern={{major}},enable=${{ matrix.variant.is_default }}

            # Variant-specific version tags
            type=semver,pattern=${{ matrix.variant.name }}-{{version}}
            type=semver,pattern=${{ matrix.variant.name }}-{{major}}.{{minor}}
            type=semver,pattern=${{ matrix.variant.name }}-{{major}}

            # Latest tags for main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && matrix.variant.is_default }}
            type=raw,value=${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' && matrix.variant.is_default }}

            # Variant-specific latest tags
            type=raw,value=${{ matrix.variant.name }}-latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ matrix.variant.name }}-${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' }}

            # PR tags
            type=raw,value=${{ matrix.variant.name }}-pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Test Docker image
        run: |
          # test_docker.sh looks for images named:
          #   <base>:<tag>           -> JSONPath variant
          #   <base>:jq-<tag>        -> jq variant
          #   <base>:dual-<tag>      -> dual variant
          # so we tag the built image accordingly for the current matrix entry.
          case "${{ matrix.variant.name }}" in
            jsonpath) LOCAL_TAG=test ;;
            jq)       LOCAL_TAG=jq-test ;;
            dual)     LOCAL_TAG=dual-test ;;
            *) echo "unknown variant"; exit 1 ;;
          esac
          docker tag "$(echo "${{ steps.meta.outputs.tags }}" | head -n1)" "argocd-applicationset-json-plugin:$LOCAL_TAG"

          # Install test dependencies
          pip install jsonpath-ng

          # Run Docker tests for this variant
          cd tests
          ./test_docker.sh "test" "argocd-applicationset-json-plugin"

      - name: Image digest
        run: |
          echo "Built, tested, and pushed ${{ matrix.variant.name }} variant"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"
