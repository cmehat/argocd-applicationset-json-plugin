name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          pip install jsonpath-ng

      - name: Run Python plugin tests
        run: |
          cd tests
          ./run_all_tests.sh

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: tests/*.log

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant:
          - name: jsonpath
            dockerfile: Dockerfile
            is_default: true
          - name: jq
            dockerfile: Dockerfile.jq
            is_default: false
          - name: dual
            dockerfile: Dockerfile.dual
            is_default: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For default (jsonpath) variant on main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && matrix.variant.is_default }}
            type=raw,value=${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' && matrix.variant.is_default }}
            # Variant-specific tags
            type=raw,value=${{ matrix.variant.name }}-latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ matrix.variant.name }}-${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' }}
            # PR tags
            type=raw,value=${{ matrix.variant.name }}-pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Test Docker image
        run: |
          # Tag image for local testing
          docker tag $(echo "${{ steps.meta.outputs.tags }}" | head -n1) argocd-applicationset-json-plugin:${{ matrix.variant.name }}-test

          # Install test dependencies
          pip install jsonpath-ng

          # Run Docker tests for this variant
          cd tests
          ./test_docker.sh "${{ matrix.variant.name }}-test" "argocd-applicationset-json-plugin"

      - name: Image digest
        run: echo "Built, tested, and pushed ${{ matrix.variant.name }} variant"
