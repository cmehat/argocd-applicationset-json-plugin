default:
  tags:
    - gcp

image: docker:27

stages:
  - test
  - build
  - release

variables:
  DOCKER_VERSION: "27"
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: "tcp://docker:2375"
  IMAGE_NAME: "${CI_REGISTRY_IMAGE}"

before_script:
  - |
    echo "Waiting for Docker daemon..."
    for i in $(seq 1 30); do
      docker info >/dev/null 2>&1 && break
      sleep 1
    done
    docker info >/dev/null 2>&1 || { echo "Docker daemon not available"; exit 1; }
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

# Test Python plugins
test:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y jq curl
    - pip install jsonpath-ng
  only:
    - merge_requests
    - main
    - tags
  script:
    - cd tests
    - ./run_all_tests.sh
  artifacts:
    when: always
    reports:
      junit: tests/test-results.xml
    paths:
      - tests/*.log

# Build and test Docker images
build:
  stage: build
  services:
    - docker:${DOCKER_VERSION}-dind
  only:
    - merge_requests
    - main
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" == "main" ]; then
        TAG_SUFFIX="latest"
      else
        TAG_SUFFIX="mr-${CI_MERGE_REQUEST_IID}"
      fi

      # Build JSONPath variant (default, recommended)
      echo "Building JSONPath variant: ${IMAGE_NAME}:${TAG_SUFFIX}"
      docker build -f Dockerfile -t "${IMAGE_NAME}:${TAG_SUFFIX}" .
      docker tag "${IMAGE_NAME}:${TAG_SUFFIX}" "${IMAGE_NAME}:jsonpath-${TAG_SUFFIX}"

      # Build jq variant
      echo "Building jq variant: ${IMAGE_NAME}:jq-${TAG_SUFFIX}"
      docker build -f Dockerfile.jq -t "${IMAGE_NAME}:jq-${TAG_SUFFIX}" .

      # Build dual variant
      echo "Building dual variant: ${IMAGE_NAME}:dual-${TAG_SUFFIX}"
      docker build -f Dockerfile.dual -t "${IMAGE_NAME}:dual-${TAG_SUFFIX}" .

      # Test Docker images
      echo "Testing Docker images..."
      apk add --no-cache python3 py3-pip bash curl
      pip3 install --break-system-packages jsonpath-ng
      cd tests && ./test_docker.sh "test" "argocd-applicationset-json-plugin" || true
      cd ..

      if [ "$CI_COMMIT_BRANCH" != "main" ]; then
        echo "Pushing MR images for testing"
        docker push "${IMAGE_NAME}:${TAG_SUFFIX}"
        docker push "${IMAGE_NAME}:jsonpath-${TAG_SUFFIX}"
        docker push "${IMAGE_NAME}:jq-${TAG_SUFFIX}"
        docker push "${IMAGE_NAME}:dual-${TAG_SUFFIX}"
      fi

# Release all three variants on main
release:
  stage: release
  services:
    - docker:${DOCKER_VERSION}-dind
  only:
    - main
  script:
    - |
      # Build JSONPath variant (default)
      echo "Building JSONPath variant (default)"
      docker build -f Dockerfile -t "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" .
      docker tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" "${IMAGE_NAME}:latest"
      docker tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" "${IMAGE_NAME}:jsonpath-${CI_COMMIT_SHORT_SHA}"
      docker tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" "${IMAGE_NAME}:jsonpath-latest"

      # Build jq variant
      echo "Building jq variant"
      docker build -f Dockerfile.jq -t "${IMAGE_NAME}:jq-${CI_COMMIT_SHORT_SHA}" .
      docker tag "${IMAGE_NAME}:jq-${CI_COMMIT_SHORT_SHA}" "${IMAGE_NAME}:jq-latest"

      # Build dual variant
      echo "Building dual variant"
      docker build -f Dockerfile.dual -t "${IMAGE_NAME}:dual-${CI_COMMIT_SHORT_SHA}" .
      docker tag "${IMAGE_NAME}:dual-${CI_COMMIT_SHORT_SHA}" "${IMAGE_NAME}:dual-latest"

      # Push all tags
      echo "Pushing all images"
      docker push "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
      docker push "${IMAGE_NAME}:latest"
      docker push "${IMAGE_NAME}:jsonpath-${CI_COMMIT_SHORT_SHA}"
      docker push "${IMAGE_NAME}:jsonpath-latest"
      docker push "${IMAGE_NAME}:jq-${CI_COMMIT_SHORT_SHA}"
      docker push "${IMAGE_NAME}:jq-latest"
      docker push "${IMAGE_NAME}:dual-${CI_COMMIT_SHORT_SHA}"
      docker push "${IMAGE_NAME}:dual-latest"

      echo "Published images:"
      echo "  JSONPath (default, recommended):"
      echo "    - ${IMAGE_NAME}:latest"
      echo "    - ${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
      echo "    - ${IMAGE_NAME}:jsonpath-latest"
      echo "    - ${IMAGE_NAME}:jsonpath-${CI_COMMIT_SHORT_SHA}"
      echo "  jq-only:"
      echo "    - ${IMAGE_NAME}:jq-latest"
      echo "    - ${IMAGE_NAME}:jq-${CI_COMMIT_SHORT_SHA}"
      echo "  Dual (jq + JSONPath):"
      echo "    - ${IMAGE_NAME}:dual-latest"
      echo "    - ${IMAGE_NAME}:dual-${CI_COMMIT_SHORT_SHA}"

# Release versioned tags (triggered by git tags like v1.0.0)
release-version:
  stage: release
  services:
    - docker:${DOCKER_VERSION}-dind
  only:
    - tags
  except:
    - branches
  script:
    - |
      # Extract version from git tag (e.g., v1.0.0 -> 1.0.0)
      VERSION=${CI_COMMIT_TAG#v}

      # Extract major.minor (e.g., 1.0.0 -> 1.0)
      MINOR_VERSION=$(echo $VERSION | cut -d. -f1,2)

      # Extract major (e.g., 1.0.0 -> 1)
      MAJOR_VERSION=$(echo $VERSION | cut -d. -f1)

      echo "Building release version: $VERSION"
      echo "  Full version: $VERSION"
      echo "  Minor version: $MINOR_VERSION"
      echo "  Major version: $MAJOR_VERSION"

      # Build JSONPath variant (default)
      docker build -f Dockerfile -t "${IMAGE_NAME}:${VERSION}" .
      docker tag "${IMAGE_NAME}:${VERSION}" "${IMAGE_NAME}:${MINOR_VERSION}"
      docker tag "${IMAGE_NAME}:${VERSION}" "${IMAGE_NAME}:${MAJOR_VERSION}"
      docker tag "${IMAGE_NAME}:${VERSION}" "${IMAGE_NAME}:jsonpath-${VERSION}"
      docker tag "${IMAGE_NAME}:${VERSION}" "${IMAGE_NAME}:jsonpath-${MINOR_VERSION}"
      docker tag "${IMAGE_NAME}:${VERSION}" "${IMAGE_NAME}:jsonpath-${MAJOR_VERSION}"

      # Build jq variant
      docker build -f Dockerfile.jq -t "${IMAGE_NAME}:jq-${VERSION}" .
      docker tag "${IMAGE_NAME}:jq-${VERSION}" "${IMAGE_NAME}:jq-${MINOR_VERSION}"
      docker tag "${IMAGE_NAME}:jq-${VERSION}" "${IMAGE_NAME}:jq-${MAJOR_VERSION}"

      # Build dual variant
      docker build -f Dockerfile.dual -t "${IMAGE_NAME}:dual-${VERSION}" .
      docker tag "${IMAGE_NAME}:dual-${VERSION}" "${IMAGE_NAME}:dual-${MINOR_VERSION}"
      docker tag "${IMAGE_NAME}:dual-${VERSION}" "${IMAGE_NAME}:dual-${MAJOR_VERSION}"

      # Push all version tags
      echo "Pushing version tags..."

      # JSONPath variant (default)
      docker push "${IMAGE_NAME}:${VERSION}"
      docker push "${IMAGE_NAME}:${MINOR_VERSION}"
      docker push "${IMAGE_NAME}:${MAJOR_VERSION}"
      docker push "${IMAGE_NAME}:jsonpath-${VERSION}"
      docker push "${IMAGE_NAME}:jsonpath-${MINOR_VERSION}"
      docker push "${IMAGE_NAME}:jsonpath-${MAJOR_VERSION}"

      # jq variant
      docker push "${IMAGE_NAME}:jq-${VERSION}"
      docker push "${IMAGE_NAME}:jq-${MINOR_VERSION}"
      docker push "${IMAGE_NAME}:jq-${MAJOR_VERSION}"

      # Dual variant
      docker push "${IMAGE_NAME}:dual-${VERSION}"
      docker push "${IMAGE_NAME}:dual-${MINOR_VERSION}"
      docker push "${IMAGE_NAME}:dual-${MAJOR_VERSION}"

      echo ""
      echo "✅ Published version $VERSION with tags:"
      echo ""
      echo "JSONPath (default):"
      echo "  - ${IMAGE_NAME}:${VERSION}"
      echo "  - ${IMAGE_NAME}:${MINOR_VERSION}"
      echo "  - ${IMAGE_NAME}:${MAJOR_VERSION}"
      echo "  - ${IMAGE_NAME}:jsonpath-${VERSION}"
      echo "  - ${IMAGE_NAME}:jsonpath-${MINOR_VERSION}"
      echo "  - ${IMAGE_NAME}:jsonpath-${MAJOR_VERSION}"
      echo ""
      echo "jq variant:"
      echo "  - ${IMAGE_NAME}:jq-${VERSION}"
      echo "  - ${IMAGE_NAME}:jq-${MINOR_VERSION}"
      echo "  - ${IMAGE_NAME}:jq-${MAJOR_VERSION}"
      echo ""
      echo "Dual variant:"
      echo "  - ${IMAGE_NAME}:dual-${VERSION}"
      echo "  - ${IMAGE_NAME}:dual-${MINOR_VERSION}"
      echo "  - ${IMAGE_NAME}:dual-${MAJOR_VERSION}"
